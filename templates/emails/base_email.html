<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{% block title %}LUCKYTECH INNOVATION GROUND {% endblock %}</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f6f6f6; margin:0; padding:0;">
  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center" style="padding: 40px;">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:8px; padding:20px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom: 20px;">
              <img src="https://lig.com.gh/static/images/logo.jpg" alt="LIG" width="120">
            </td>
          </tr>

          <!-- Title -->
          <tr>
            <td align="center" style="font-size:22px; font-weight:bold; color:#333; padding-bottom: 10px;">
              {% block header %}luckytech innovation ground{% endblock %}
            </td>
          </tr>

          <!-- Main Content -->
          <tr>
            <td style="font-size:16px; color:#555; padding:20px;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Call to Action Button -->
          {% block button %}
          {% endblock %}

          <!-- Footer -->
          <tr>
            <td align="center" style="font-size:12px; color:#aaa; padding-top:30px;">
              © {{ year }} LIG. All rights reserved.<br>
              If you did not request this, please ignore this email.
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
