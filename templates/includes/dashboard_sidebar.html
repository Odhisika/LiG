{% load static %}

<!-- Professional Dashboard Sidebar -->
<aside class="modern-sidebar">
    <div class="sidebar-header">
        <div class="logo-container">
            <div class="logo-icon">
                <i class="fa-solid fa-gauge-high"></i>
            </div>
            <h3 class="logo-text">Dashboard</h3>
        </div>
    </div>
    
    <nav class="sidebar-nav">
        <ul class="nav-list">
            <li class="nav-item">
                <a class="nav-link {% if request.path == '/accounts/' or request.path == '/accounts/dashboard/' %}active{% endif %}" 
                   href="{% url 'dashboard' %}">
                    <div class="nav-icon">
                        <i class="fa-solid fa-house"></i>
                    </div>
                    <span class="nav-text">Overview</span>
                </a>
            </li>
            
            <li class="nav-item">
                <a class="nav-link {% if 'my_orders' in request.path %}active{% endif %}" 
                   href="{% url 'my_orders' %}">
                    <div class="nav-icon">
                        <i class="fa-solid fa-bag-shopping"></i>
                    </div>
                    <span class="nav-text">My Orders</span>
                </a>
            </li>
            
            <li class="nav-item">
                <a class="nav-link {% if 'edit_profile' in request.path %}active{% endif %}" 
                   href="{% url 'edit_profile' %}">
                    <div class="nav-icon">
                        <i class="fa-solid fa-user-pen"></i>
                    </div>
                    <span class="nav-text">Edit Profile</span>
                </a>
            </li>
            
            <li class="nav-item">
                <a class="nav-link {% if 'change_password' in request.path %}active{% endif %}" 
                   href="{% url 'change_password' %}">
                    <div class="nav-icon">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <span class="nav-text">Security</span>
                </a>
            </li>
        </ul>
        
        <div class="nav-divider"></div>
        
        <ul class="nav-list">
            <li class="nav-item">
                <a class="nav-link nav-link-danger" href="{% url 'logout' %}">
                    <div class="nav-icon">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </div>
                    <span class="nav-text">Sign Out</span>
                </a>
            </li>
        </ul>
    </nav>
    
    <div class="sidebar-footer">
        <div class="user-mini-profile">
            <div class="mini-avatar">
                {% if userprofile.profile_picture %}
                    <img src="{{ userprofile.profile_picture.url }}" alt="User">
                {% else %}
                    <img src="{% static 'images/defualt_user.png' %}" alt="User">
                {% endif %}
            </div>
            <div class="mini-user-info">
                <p class="mini-user-name">{{ user.first_name }}</p>
                <p class="mini-user-role">Member</p>
            </div>
        </div>
    </div>
</aside>

<style>
/* Professional Sidebar Styles */
.modern-sidebar {
    width: 280px;
    background: #ffffff;
    border-radius: 12px;
    padding: 1.5rem 0;
    box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
    border: 1px solid #e2e8f0;
    display: flex;
    flex-direction: column;
    height: fit-content;
    position: sticky;
    top: 100px; /* Adjusted for sticky header */
}

.sidebar-header {
    padding: 0 1.5rem 1.5rem 1.5rem;
    border-bottom: 1px solid #f1f5f9;
}

.logo-container {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.logo-icon {
    width: 40px;
    height: 40px;
    background: #4f46e5;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.125rem;
}

.logo-text {
    font-size: 1.25rem;
    font-weight: 700;
    margin: 0;
    color: #1e293b;
}

.sidebar-nav {
    flex: 1;
    padding: 1.5rem 0;
}

.nav-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.nav-item {
    margin-bottom: 0.25rem;
}

.nav-link {
    display: flex;
    align-items: center;
    gap: 0.875rem;
    padding: 0.75rem 1.5rem;
    color: #64748b;
    text-decoration: none;
    font-weight: 500;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    font-size: 0.9375rem;
}

.nav-link:hover {
    background: #f8fafc;
    color: #4f46e5;
    text-decoration: none;
}

.nav-link.active {
    background: #f1f5f9;
    color: #4f46e5;
    font-weight: 600;
}

.nav-link.active:before {
    content: '';
    position: absolute;
    left: 0;
    top: 6px;
    bottom: 6px;
    width: 3px;
    background: #4f46e5;
    border-radius: 0 4px 4px 0;
}

.nav-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    opacity: 0.7;
}

.nav-link.active .nav-icon {
    opacity: 1;
}

.nav-text {
    flex: 1;
}

.nav-badge {
    background: #f59e0b;
    color: #fff;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.125rem 0.5rem;
    border-radius: 9999px;
}

.nav-divider {
    height: 1px;
    background: #f1f5f9;
    margin: 1rem 1.5rem;
}

.nav-link-danger {
    color: #f43f5e !important;
}

.nav-link-danger:hover {
    background: #fff1f2 !important;
    color: #e11d48 !important;
}

.sidebar-footer {
    padding: 1.5rem 1.5rem 0 1.5rem;
    border-top: 1px solid #f1f5f9;
}

.user-mini-profile {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem;
    background: #f8fafc;
    border-radius: 12px;
}

.mini-avatar {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
}

.mini-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.mini-user-info {
    flex: 1;
    min-width: 0;
}

.mini-user-name {
    font-weight: 600;
    color: #1e293b;
    margin: 0;
    font-size: 0.875rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.mini-user-role {
    font-size: 0.75rem;
    color: #94a3b8;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.025em;
}

/* Mobile Responsiveness */
@media (max-width: 1024px) {
    .modern-sidebar {
        width: 100%;
        border-radius: 12px;
        margin-bottom: 1.5rem;
        position: static;
    }
    
    .nav-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 0.25rem;
    }
    
    .sidebar-header {
        border-bottom: none;
        padding-bottom: 0.5rem;
    }
    
    .sidebar-nav {
        padding: 0.5rem 0;
    }
}

@media (max-width: 768px) {
    .nav-list {
        grid-template-columns: 1fr;
    }
}
</style>
