{% extends 'base.html' %}
{% load static %}

{% block title %}{{ page.title }} | LuckyTech Innovation Ground{% endblock %}

{% block meta %}
<meta name="description" content="{{ page.meta_description|default:page.title }}">
{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/premium-it.css' %}">

<section class="premium-hero">
    <div class="container text-center">
        <h1 class="hero-title">{{ page.title }}</h1>
        <p class="text-muted">Last updated: {{ page.updated_at|date:"F d, Y" }}</p>
    </div>
</section>

<section class="premium-bg-white py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="premium-card p-4">
                    <div class="fr-view">
                        {{ page.content|safe }}
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
