<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Payment — LiG Store</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .processing-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
            color: white;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }

        /* Hubtel orange spinner */
        .spinner-ring {
            width: 90px;
            height: 90px;
            border: 6px solid rgba(255,102,0,0.2);
            border-top-color: #FF6600;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .amount-badge {
            background: rgba(255,102,0,0.15);
            border: 1px solid rgba(255,102,0,0.4);
            border-radius: 50px;
            padding: 0.5rem 1.5rem;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .amount-badge span {
            font-size: 1.5rem;
            font-weight: 700;
            color: #FF6600;
        }

        .info-row {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .info-row .label { color: rgba(255,255,255,0.6); }
        .info-row .value { color: white; font-weight: 600; }

        .status-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 1.5rem 0;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #FF6600;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40%            { transform: scale(1);   opacity: 1;   }
        }

        .countdown {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            margin-top: 1rem;
        }

        .hubtel-badge {
            background: #FF6600;
            color: white;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.75rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="processing-card">

        <div class="spinner-ring"></div>

        <h2 class="fw-bold mb-1">Confirming Payment</h2>
        <p class="text-white-50 mb-3">
            We're waiting for <span class="hubtel-badge">Hubtel</span> to confirm your payment.<br>
            This usually takes a few seconds.
        </p>

        <div class="amount-badge">
            <span>GHS {{ payment.amount }}</span>
        </div>

        <div class="info-row">
            <span class="label">Order</span>
            <span class="value">{{ order.order_number }}</span>
        </div>
        <div class="info-row">
            <span class="label">Reference</span>
            <span class="value">{{ payment.ref }}</span>
        </div>

        <div class="status-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <p class="text-white-50 small">
            <i class="fas fa-lock me-1"></i>
            Your payment is being securely verified. <strong>Do not close this page.</strong>
        </p>

        <div class="countdown" id="countdown-text">Checking status in <span id="counter">5</span>s…</div>
    </div>

    <script>
    (function () {
        const paymentRef  = "{{ payment.ref }}";
        const pollUrl     = "/payment/status/{{ payment.id }}/";
        const successBase = "/payment/verify/?clientReference=" + encodeURIComponent(paymentRef) + "&_polled=1";
        const MAX_POLLS   = 24;   // 24 × 5s = 2 minutes max
        let pollCount     = 0;
        let countdownVal  = 5;
        const counterEl   = document.getElementById("counter");

        // Countdown display
        const ticker = setInterval(() => {
            countdownVal--;
            counterEl.textContent = countdownVal;
            if (countdownVal <= 0) {
                countdownVal = 5;
                poll();
            }
        }, 1000);

        function poll() {
            pollCount++;
            fetch(pollUrl, { credentials: "same-origin" })
                .then(r => r.json())
                .then(data => {
                    if (data.status === "successful" && data.verified) {
                        clearInterval(ticker);
                        // Redirect to verify_payment which will now show the success page
                        window.location.href = "/payment/verify/?clientReference=" + encodeURIComponent(paymentRef);
                    } else if (data.status === "failed") {
                        clearInterval(ticker);
                        window.location.href = "/payment/verify/?clientReference=" + encodeURIComponent(paymentRef);
                    } else if (pollCount >= MAX_POLLS) {
                        // 2 minutes passed — redirect anyway to show current state
                        clearInterval(ticker);
                        window.location.href = "/payment/verify/?clientReference=" + encodeURIComponent(paymentRef) + "&timeout=1";
                    }
                })
                .catch(() => {
                    // Network error — just keep polling
                });
        }

        // First poll after 5 seconds (handled by ticker)
    })();
    </script>
</body>
</html>
